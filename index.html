<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seedance Show Tracker – Bhargav Ranjolkar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#070B14;--border:#1a2d50;--border-glow:#2a4a80;
  --text:#E8EDF5;--text-muted:#6b82a8;--text-dim:#3d5070;
  --green:#4DFFB4;--blue:#4DA6FF;--amber:#FFD166;
  --red:#FF6B6B;--purple:#B86BFF;--cyan:#00D4FF;
  --card:rgba(13,21,37,0.85);--gborder:rgba(77,166,255,0.12);
  --r:14px;--rs:8px;
  --fd:'Space Grotesk',sans-serif;--fb:'Inter',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--fb);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 20% 10%,rgba(77,166,255,0.06) 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 80% 80%,rgba(77,255,180,0.05) 0%,transparent 60%);pointer-events:none;z-index:0}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,212,255,0.012) 2px,rgba(0,212,255,0.012) 4px);pointer-events:none;z-index:0;animation:scan 10s linear infinite}
@keyframes scan{0%{background-position:0 0}100%{background-position:0 100px}}
.w{position:relative;z-index:1;max-width:1600px;margin:0 auto;padding:0 24px 40px}

/* HEADER */
.hdr{padding:28px 0 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;border-bottom:1px solid var(--border);position:relative}
.hdr::after{content:'';position:absolute;bottom:-1px;left:0;width:200px;height:1px;background:linear-gradient(90deg,var(--cyan),transparent)}
.hl{display:flex;align-items:center;gap:16px}
.logo{width:44px;height:44px;border-radius:10px;background:linear-gradient(135deg,var(--blue),var(--green));display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-weight:700;font-size:18px;color:#070B14;flex-shrink:0}
.ht h1{font-family:var(--fd);font-size:1.35rem;font-weight:700;letter-spacing:-0.02em}
.ht p{font-size:0.78rem;color:var(--text-muted);margin-top:2px;letter-spacing:0.03em}
.hr{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.ri{font-size:0.75rem;color:var(--text-muted);display:flex;align-items:center;gap:6px}
.pd{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pg 2s ease-in-out infinite}
@keyframes pg{0%,100%{box-shadow:0 0 0 0 rgba(77,255,180,0.5)}50%{box-shadow:0 0 0 5px rgba(77,255,180,0)}}
.ts{font-size:0.72rem;color:var(--text-dim)}

/* TABS */
.tnav{display:flex;gap:6px;margin:24px 0 28px;padding:4px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:12px;width:fit-content}
.tb{padding:9px 22px;border-radius:8px;border:none;background:transparent;color:var(--text-muted);font-family:var(--fd);font-size:0.88rem;font-weight:500;cursor:pointer;transition:all .2s}
.tb.active{background:linear-gradient(135deg,rgba(77,166,255,0.2),rgba(77,255,180,0.1));color:var(--text);box-shadow:0 0 0 1px rgba(77,166,255,0.3)}
.tb:hover:not(.active){background:rgba(255,255,255,0.04);color:var(--text)}
.tp{display:none}.tp.active{display:block}

/* SECTION TITLE */
.st{font-family:var(--fd);font-size:0.72rem;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-muted);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.st::after{content:'';flex:1;height:1px;background:var(--border)}
.gap{height:32px}

/* CARDS GRID */
.cg{display:grid;gap:14px;margin-bottom:32px}
.cg4{grid-template-columns:repeat(4,1fr)}
.cgf{grid-template-columns:repeat(auto-fill,minmax(200px,1fr))}

/* SUMMARY CARD */
.sc{background:var(--card);border:1px solid var(--gborder);border-radius:var(--r);padding:18px 20px;cursor:pointer;transition:all .25s;position:relative;overflow:hidden;backdrop-filter:blur(12px)}
.sc::before{content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.04),transparent);transition:left .5s}
.sc:hover::before{left:150%}
.sc:hover{border-color:rgba(77,166,255,0.3);transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,0,0,0.3)}
.sci{font-size:1.4rem;margin-bottom:10px}
.scl{font-size:0.7rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:6px}
.scn{font-family:var(--fd);font-size:2rem;font-weight:700;line-height:1;margin-bottom:6px}
.scp{font-size:0.78rem;color:var(--text-muted)}
.scb{margin-top:10px;height:3px;background:rgba(255,255,255,0.07);border-radius:2px;overflow:hidden}
.scbf{height:100%;border-radius:2px;transition:width 1s ease}
.cg .ag .scn,.cg .ag .scbf{color:var(--green);background:var(--green)}
.ag .scn{color:var(--green)}.ag .scbf{background:var(--green)}
.ab .scn{color:var(--blue)}.ab .scbf{background:var(--blue)}
.aa .scn{color:var(--amber)}.aa .scbf{background:var(--amber)}
.ar .scn{color:var(--red)}.ar .scbf{background:var(--red)}
.ap .scn{color:var(--purple)}.ap .scbf{background:var(--purple)}
.ac .scn{color:var(--cyan)}.ac .scbf{background:var(--cyan)}

/* SHOW LIST */
.sl{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;margin-bottom:32px}
.shc{background:var(--card);border:1px solid var(--gborder);border-radius:var(--r);padding:18px 20px;cursor:pointer;transition:all .25s;backdrop-filter:blur(12px)}
.shc:hover{border-color:rgba(77,166,255,0.3);transform:translateY(-2px)}
.shh{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.shn{font-family:var(--fd);font-size:0.95rem;font-weight:600;line-height:1.3}
.she{font-size:0.72rem;color:var(--text-muted);background:rgba(255,255,255,0.06);padding:3px 8px;border-radius:20px;flex-shrink:0;margin-left:8px}
.shs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}
.ssv{font-family:var(--fd);font-size:1.1rem;font-weight:700}
.ssl{font-size:0.65rem;color:var(--text-muted);letter-spacing:0.05em;text-transform:uppercase;margin-top:2px;text-align:center}
.mb{display:flex;flex-direction:column;gap:5px}
.mbr{display:flex;align-items:center;gap:8px;font-size:0.68rem;color:var(--text-muted)}
.mbr span:first-child{width:40px;flex-shrink:0}
.mbt{flex:1;height:4px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden}
.mbf{height:100%;border-radius:2px}
.mbp{width:32px;text-align:right;flex-shrink:0}

/* RESOURCE */
.rg{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.rc{background:var(--card);border:1px solid var(--gborder);border-radius:var(--r);padding:18px 20px;backdrop-filter:blur(12px);transition:all .25s}
.rc:hover{border-color:rgba(77,166,255,0.25);transform:translateY(-1px)}
.rch{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.rcn{font-family:var(--fd);font-size:0.92rem;font-weight:600}
.rs{display:flex;align-items:center;gap:6px;font-size:0.7rem;font-weight:600;letter-spacing:0.06em;text-transform:uppercase}
.sd{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.occ .sd{background:var(--green);box-shadow:0 0 6px var(--green)}.occ .rst{color:var(--green)}
.plt .sd{background:var(--amber);box-shadow:0 0 6px var(--amber)}.plt .rst{color:var(--amber)}
.idl .sd{background:var(--red);box-shadow:0 0 6px var(--red)}.idl .rst{color:var(--red)}
.rei{font-size:0.75rem;color:var(--text-muted);margin-bottom:10px}
.bv{padding:6px 12px;border-radius:6px;border:1px solid var(--border-glow);background:rgba(77,166,255,0.06);color:var(--blue);font-size:0.72rem;font-family:var(--fb);cursor:pointer;transition:all .2s}
.bv:hover{background:rgba(77,166,255,0.15)}

/* FILTERS */
.rsh{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.rctl{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.fps{display:flex;gap:6px;flex-wrap:wrap}
.pl{padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text-muted);font-size:0.75rem;font-family:var(--fb);cursor:pointer;transition:all .2s}
.pl.active{border-color:var(--blue);background:rgba(77,166,255,0.1);color:var(--blue)}
.sbx{padding:7px 12px;border-radius:8px;border:1px solid var(--border);background:rgba(255,255,255,0.03);color:var(--text);font-size:0.8rem;font-family:var(--fb);outline:none;transition:border .2s;width:200px}
.sbx:focus{border-color:var(--blue)}.sbx::placeholder{color:var(--text-dim)}

/* BADGE */
.badge{font-size:0.72rem;color:var(--text-muted);background:rgba(255,255,255,0.05);padding:3px 10px;border-radius:20px}

/* MODAL */
.mo{position:fixed;inset:0;z-index:1000;background:rgba(4,8,20,0.88);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;padding:20px}
.mo.open{display:flex}
.md{background:linear-gradient(160deg,#0e1b35,#0a1220);border:1px solid rgba(77,166,255,0.2);border-radius:18px;width:100%;max-width:860px;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 25px 80px rgba(0,0,0,0.6);overflow:hidden}
.mh{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--border);flex-shrink:0}
.mt{font-family:var(--fd);font-size:1.1rem;font-weight:700}
.ms{font-size:0.75rem;color:var(--text-muted);margin-top:3px}
.mc{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;font-size:1.2rem;transition:all .2s;display:flex;align-items:center;justify-content:center}
.mc:hover{background:rgba(255,107,107,0.1);border-color:var(--red);color:var(--red)}
.mb2{padding:20px 24px;overflow-y:auto;flex:1}
table.dt{width:100%;border-collapse:collapse;font-size:0.8rem}
table.dt th{text-align:left;padding:8px 10px;font-size:0.65rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-muted);border-bottom:1px solid var(--border)}
table.dt td{padding:9px 10px;border-bottom:1px solid rgba(255,255,255,0.04);vertical-align:middle}
table.dt tr:hover td{background:rgba(77,166,255,0.04)}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:0.68rem;font-weight:600}
.tip{background:rgba(77,166,255,0.15);color:var(--blue)}
.trv{background:rgba(255,209,102,0.15);color:var(--amber)}
.tcr{background:rgba(255,107,107,0.15);color:var(--red)}
.tap{background:rgba(77,255,180,0.15);color:var(--green)}
.tyt{background:rgba(107,130,168,0.15);color:var(--text-muted)}
.tfc{background:rgba(184,107,255,0.15);color:var(--purple)}

/* EMPTY */
.es{text-align:center;padding:40px 20px;color:var(--text-muted);font-size:0.85rem}
.es .i{font-size:2rem;margin-bottom:10px}

::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border-glow);border-radius:3px}
@media(max-width:900px){.cg4{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){.cg4{grid-template-columns:repeat(2,1fr)}.hdr{flex-direction:column;align-items:flex-start}.w{padding:0 14px 32px}}
</style>
</head>

<!-- MODAL -->
<div class="mo" id="mo">
  <div class="md">
    <div class="mh">
      <div><div class="mt" id="mtitle"></div><div class="ms" id="msub"></div></div>
      <button class="mc" id="mclose">✕</button>
    </div>
    <div class="mb2" id="mbody"></div>
  </div>
</div>

<div class="w">
  <header class="hdr">
    <div class="hl">
      <div class="logo">S</div>
      <div class="ht">
        <h1>Seedance Show Tracker</h1>
        <p>BHARGAV RANJOLKAR · PRODUCTION DASHBOARD</p>
      </div>
    </div>
    <div class="hr">
      <div class="ri"><div class="pd"></div><span id="dataInfo">Loading…</span></div>
      <div class="ts" id="ts">–</div>
    </div>
  </header>

  <nav class="tnav">
    <button class="tb active" data-tab="shows">Shows Update</button>
    <button class="tb" data-tab="resource">Resource Management</button>
  </nav>

  <!-- TAB 1 -->
  <div class="tp active" id="tab-shows">
    <div class="st">Animation Status</div>
    <div class="cg cg4" id="animGrid"></div>
    <div class="st">Edit Status</div>
    <div class="cg cg4" id="editGrid"></div>
    <div class="st">Overall</div>
    <div class="cg cgf" id="overallGrid"></div>
    <div class="gap"></div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <div class="st" style="margin-bottom:0">Show Breakdown</div>
      <div class="badge" id="showBadge">— shows</div>
    </div>
    <div class="sl" id="showList"></div>
  </div>

  <!-- TAB 2 -->
  <div class="tp" id="tab-resource">
    <div class="st">Resource Overview</div>
    <div class="cg cg4" id="resSum"></div>
    <div class="gap"></div>
    <div class="rsh">
      <div class="st" style="margin-bottom:0">Animators</div>
      <div class="rctl">
        <div class="fps">
          <button class="pl active" data-fg="a" data-v="all">All</button>
          <button class="pl" data-fg="a" data-v="occ">Occupied</button>
          <button class="pl" data-fg="a" data-v="plt">Plotted</button>
          <button class="pl" data-fg="a" data-v="idl">Idle</button>
        </div>
        <input class="sbx" id="asrch" placeholder="Search animator…" type="search">
      </div>
    </div>
    <div class="rg" id="animRes"></div>
    <div class="gap"></div>
    <div class="rsh">
      <div class="st" style="margin-bottom:0">Editors</div>
      <div class="rctl">
        <div class="fps">
          <button class="pl active" data-fg="e" data-v="all">All</button>
          <button class="pl" data-fg="e" data-v="occ">Occupied</button>
          <button class="pl" data-fg="e" data-v="plt">Plotted</button>
          <button class="pl" data-fg="e" data-v="idl">Idle</button>
        </div>
        <input class="sbx" id="esrch" placeholder="Search editor…" type="search">
      </div>
    </div>
    <div class="rg" id="editRes"></div>
  </div>
</div>

const AA = new Set(['animation - yts','animation - in progress','animation r1 correction','krock corrections in progress']);
const EA = new Set(['rc 1 - yts','rc 1 edit in progress','rc 1 edit corrections','ready to pick for rc2','rc 2 edit in progress','rc 2 edit - corrections','rc 2 edit corrections','ready to pick for fc','final cut in progress']);

const mA = v => AMAP[(v||'').toLowerCase().trim()] || null;
const mE = v => EMAP[(v||'').toLowerCase().trim()] || null;
const isAA = v => AA.has((v||'').toLowerCase().trim());
const isEA = v => EA.has((v||'').toLowerCase().trim());

// =====================================================================
// HELPERS
// =====================================================================
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function tag(m, raw) {
  if (!raw) return '<span class="tag tyt">–</span>';
  const cls={ip:'tip',rv:'trv',cr:'tcr',ap:'tap',yts:'tyt',fc:'tfc'}[m]||'tyt';
  const lbl={ip:'In Progress',rv:'Review',cr:'Corrections',ap:'Approved',yts:'YTS',fc:'Final Cut'}[m]||raw;
  return `<span class="tag ${cls}">${lbl}</span>`;
}

function pct(n,d){return d?((n/d)*100).toFixed(1):0}
function pctI(n,d){return d?Math.round((n/d)*100):0}

// =====================================================================
// STATE
// =====================================================================
let af='all', ef='all', as_='', es_='';

// =====================================================================
// MODAL
// =====================================================================
function openModal(title, sub, headers, rows) {
  document.getElementById('mtitle').textContent = title;
  document.getElementById('msub').textContent = sub;
  document.getElementById('mbody').innerHTML = !rows.length
    ? '<div class="es"><div class="i">📭</div>No episodes here.</div>'
    : `<table class="dt"><thead><tr>${headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead>
       <tbody>${rows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}</tbody></table>`;
  document.getElementById('mo').classList.add('open');
}
document.getElementById('mclose').onclick = () => document.getElementById('mo').classList.remove('open');
document.getElementById('mo').onclick = e => { if(e.target===e.currentTarget) document.getElementById('mo').classList.remove('open'); };
document.addEventListener('keydown', e => { if(e.key==='Escape') document.getElementById('mo').classList.remove('open'); });

// =====================================================================
// RENDER: SHOWS TAB
// =====================================================================
function renderShows() {
  const rows = SHOWS.filter(r => r.show);
  const total = rows.length;

  // Anim buckets
  const aB = {ip:[],rv:[],cr:[],ap:[],yts:[]};
  rows.forEach(r => { const m=mA(r.anim_status)||'yts'; (aB[m]||aB.yts).push(r); });

  // Edit buckets
  const eB = {ip:[],rv:[],cr:[],ap:[],yts:[],fc:[]};
  rows.forEach(r => { const m=mE(r.edit_status); (eB[m||'yts']||eB.yts).push(r); });

  // Anim cards
  document.getElementById('animGrid').innerHTML = '';
  [
    {k:'ip',l:'Animation In Progress',i:'🎬',c:'ab'},
    {k:'rv',l:'Animation Review',     i:'🔍',c:'aa'},
    {k:'cr',l:'Animation Corrections',i:'✏️', c:'ar'},
    {k:'ap',l:'Animation Approved',   i:'✅',c:'ag'},
  ].forEach(({k,l,i,c}) => {
    const b=aB[k], n=b.length, p=pct(n,total);
    const el=mkCard(c,i,l,n,p);
    el.onclick = () => openModal(l,`${n} episodes`,
      ['Show','Episode','Animator','Edit Status','Editor'],
      b.map(r=>[r.show,r.ep,r.anim_artist||'—',tag(mE(r.edit_status),r.edit_status),r.editor||'—']));
    document.getElementById('animGrid').appendChild(el);
  });

  // Edit cards
  document.getElementById('editGrid').innerHTML = '';
  [
    {k:'ip',l:'Editing In Progress', i:'🎞️',c:'ab'},
    {k:'rv',l:'Editing Review',      i:'👁️', c:'aa'},
    {k:'cr',l:'Editing Corrections', i:'🔧',c:'ar'},
    {k:'fc',l:'Final Cut',           i:'🎯',c:'ap'},
  ].forEach(({k,l,i,c}) => {
    const b=eB[k], n=b.length, p=pct(n,total);
    const el=mkCard(c,i,l,n,p);
    el.onclick = () => openModal(l,`${n} episodes`,
      ['Show','Episode','Editor','Edit Status','Approval'],
      b.map(r=>[r.show,r.ep,r.editor||'—',tag(mE(r.edit_status),r.edit_status),r.approval||'—']));
    document.getElementById('editGrid').appendChild(el);
  });

  // Overall approved
  document.getElementById('overallGrid').innerHTML = '';
  const appr = rows.filter(r => r.approval && r.approval.toLowerCase()==='yes');
  const readyEdit = rows.filter(r => mA(r.anim_status)==='ap'); // Ready For Edit + Approved anim
  {
    const n=appr.length, p=pct(n,total);
    const el=mkCard('ac','🏆','Approved Episodes',n,p);
    el.onclick = () => openModal('Approved Episodes',`${n} episodes`,
      ['Show','Episode','Anim Status','Edit Status'],
      appr.map(r=>[r.show,r.ep,tag(mA(r.anim_status),r.anim_status),tag(mE(r.edit_status),r.edit_status)]));
    document.getElementById('overallGrid').appendChild(el);
  }
  {
    const n=readyEdit.length, p=pct(n,total);
    const el=mkCard('ag','📦','Ready For Edit',n,p);
    el.onclick = () => openModal('Ready For Edit',`${n} episodes`,
      ['Show','Episode','Animator','Edit Status'],
      readyEdit.map(r=>[r.show,r.ep,r.anim_artist||'—',tag(mE(r.edit_status),r.edit_status)]));
    document.getElementById('overallGrid').appendChild(el);
  }

  // Show breakdown
  const shows = {};
  rows.forEach(r => { if(!shows[r.show]) shows[r.show]=[]; shows[r.show].push(r); });
  const names = Object.keys(shows).sort();
  document.getElementById('showBadge').textContent = names.length+' shows';

  document.getElementById('showList').innerHTML = names.map(name => {
    const eps=shows[name], tot=eps.length;
    const ap=pctI(eps.filter(r=>mA(r.anim_status)==='ap').length,tot);
    const ep=pctI(eps.filter(r=>['ap','fc'].includes(mE(r.edit_status))).length,tot);
    const op=pctI(eps.filter(r=>r.approval&&r.approval.toLowerCase()==='yes').length,tot);
    return `<div class="shc" data-show="${esc(name)}">
      <div class="shh"><div class="shn">${esc(name)}</div><div class="she">${tot} ep${tot!==1?'s':''}</div></div>
      <div class="shs">
        <div><div class="ssv" style="text-align:center;color:var(--blue)">${ap}%</div><div class="ssl">Anim Done</div></div>
        <div><div class="ssv" style="text-align:center;color:var(--purple)">${ep}%</div><div class="ssl">Edit Done</div></div>
        <div><div class="ssv" style="text-align:center;color:var(--green)">${op}%</div><div class="ssl">Approved</div></div>
      </div>
      <div class="mb">
        <div class="mbr"><span>Anim</span><div class="mbt"><div class="mbf" style="width:${ap}%;background:var(--blue)"></div></div><span class="mbp">${ap}%</span></div>
        <div class="mbr"><span>Edit</span><div class="mbt"><div class="mbf" style="width:${ep}%;background:var(--purple)"></div></div><span class="mbp">${ep}%</span></div>
      </div>
    </div>`;
  }).join('');

  document.querySelectorAll('.shc').forEach(el => {
    el.addEventListener('click', () => {
      const name=el.dataset.show, eps=shows[name];
      openModal(name, `${eps.length} episodes`,
        ['Episode','Animator','Anim Status','Editor','Edit Status','Approved'],
        eps.map(r=>[r.ep,r.anim_artist||'—',tag(mA(r.anim_status),r.anim_status),r.editor||'—',tag(mE(r.edit_status),r.edit_status),r.approval||'No']));
    });
  });
}

function mkCard(cls, icon, label, count, p) {
  const d=document.createElement('div');
  d.className=`sc ${cls}`;
  d.innerHTML=`<div class="sci">${icon}</div><div class="scl">${label}</div>
    <div class="scn">${count}</div><div class="scp">${p}% of total</div>
    <div class="scb"><div class="scbf" style="width:${p}%"></div></div>`;
  return d;
}

// =====================================================================
// RENDER: RESOURCE TAB
// =====================================================================
function renderResource() {
  const rows = SHOWS.filter(r => r.show);

  // Build maps: person -> active episodes
  const animMap  = buildMap(rows, 'anim_artist', 'anim_status', isAA);
  const editMap  = buildMap(rows, 'editor',      'edit_status', isEA);
  const pAnimMap = buildMap(PROD, 'anim_artist', 'anim_status', isAA);
  const pEditMap = buildMap(PROD, 'editor',      'edit_status', isEA);

  // All known people
  const allA = new Set([...Object.keys(animMap),...Object.keys(pAnimMap)]);
  const allE = new Set([...Object.keys(editMap),...Object.keys(pEditMap)]);

  const animators = classify([...allA], animMap, pAnimMap);
  const editors   = classify([...allE], editMap,  pEditMap);

  // Summary cards
  const aS=summ(animators), eS=summ(editors);
  document.getElementById('resSum').innerHTML = [
    {l:'Total Animators',   v:aS.total,    c:'ab',i:'🎨'},
    {l:'Occupied',          v:aS.occ,      c:'ag',i:'⚡'},
    {l:'Idle',              v:aS.idl,      c:'ar',i:'💤'},
    {l:'Plotted Elsewhere', v:aS.plt,      c:'aa',i:'📍'},
    {l:'Total Editors',     v:eS.total,    c:'ap',i:'🎬'},
    {l:'Occupied',          v:eS.occ,      c:'ag',i:'⚡'},
    {l:'Idle',              v:eS.idl,      c:'ar',i:'💤'},
    {l:'Plotted Elsewhere', v:eS.plt,      c:'aa',i:'📍'},
  ].map(x=>`<div class="sc ${x.c}" style="cursor:default">
    <div class="sci">${x.i}</div><div class="scl">${x.l}</div><div class="scn">${x.v}</div>
  </div>`).join('');

  renderPeople('animRes', animators, af, as_, 'anim');
  renderPeople('editRes', editors,   ef, es_, 'edit');
}

function buildMap(rows, nameKey, statusKey, activeFn) {
  const m={};
  rows.forEach(r => {
    const p=(r[nameKey]||'').trim();
    if(!p||p==='-'||p==='–'||p.toLowerCase()==='none'||p.toLowerCase()==='tbc') return;
    if(!m[p]) m[p]=[];
    if(activeFn(r[statusKey])) m[p].push(r);
  });
  return m;
}

function classify(names, primary, secondary) {
  return names.filter(n=>n&&n!=='-'&&n!=='–').sort().map(name => {
    const pw=primary[name]||[], sw=secondary[name]||[];
    if(pw.length>0) return{name,status:'occ',episodes:pw};
    if(sw.length>0) return{name,status:'plt',episodes:sw};
    return{name,status:'idl',episodes:[]};
  });
}

function summ(p){
  return{total:p.length,occ:p.filter(x=>x.status==='occ').length,plt:p.filter(x=>x.status==='plt').length,idl:p.filter(x=>x.status==='idl').length};
}

function renderPeople(containerId, people, filter, search, type) {
  const el=document.getElementById(containerId);
  const filtered=people.filter(p => {
    const mf=filter==='all'||p.status===filter;
    const ms=!search||p.name.toLowerCase().includes(search.toLowerCase());
    return mf&&ms;
  });
  if(!filtered.length){el.innerHTML='<div class="es" style="grid-column:1/-1"><div class="i">🔍</div>No matches.</div>';return;}
  const sk=type==='anim'?'anim_status':'edit_status';
  const mfn=type==='anim'?mA:mE;
  const lbl={occ:'Occupied',plt:'Plotted In Other Show',idl:'Idle'};
  el.innerHTML=filtered.map(p=>{
    const info=p.episodes.length?`${p.episodes.length} active episode${p.episodes.length!==1?'s':''}`:'No active episodes';
    const btn=p.episodes.length?`<button class="bv" data-n="${esc(p.name)}" data-t="${type}">View Plotting</button>`:'';
    return `<div class="rc ${p.status}">
      <div class="rch">
        <div class="rcn">${esc(p.name)}</div>
        <div class="rs"><div class="sd"></div><span class="rst">${lbl[p.status]}</span></div>
      </div>
      <div class="rei">${info}</div>${btn}
    </div>`;
  }).join('');
  el.querySelectorAll('.bv').forEach(btn => {
    btn.onclick = () => {
      const name=btn.dataset.n, t=btn.dataset.t;
      const p=filtered.find(x=>x.name===name);
      if(!p) return;
      openModal(`${name} — Plotting`, `${p.episodes.length} episodes`,
        ['Show','Episode','Status'],
        p.episodes.map(r=>[r.show,r.ep,tag(mfn(r[sk]),r[sk])]));
    };
  });
}

// =====================================================================
// TABS + FILTERS
// =====================================================================
document.querySelectorAll('.tb').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.tb').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.tp').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-'+btn.dataset.tab).classList.add('active');
  };
});

document.querySelectorAll('.pl').forEach(pill => {
  pill.onclick = () => {
    const g=pill.dataset.fg, v=pill.dataset.v;
    document.querySelectorAll(`.pl[data-fg="${g}"]`).forEach(p=>p.classList.remove('active'));
    pill.classList.add('active');
    if(g==='a'){af=v;}else{ef=v;}
    renderResource();
  };
});

document.getElementById('asrch').oninput = e => { as_=e.target.value; renderResource(); };
document.getElementById('esrch').oninput = e => { es_=e.target.value; renderResource(); };

// =====================================================================
// INIT
// =====================================================================
const now = new Date();
document.getElementById('ts').textContent = 'Data loaded ' + now.toLocaleTimeString();
document.getElementById('dataInfo').textContent = `${SHOWS.length} episodes · 11 shows`;

renderShows();
renderResource();
</script>
</body>
</html>
